name: Backend CI


on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main



jobs:

  backend:


    runs-on: ubuntu-latest


    defaults:
      run:
        working-directory: back



    steps:


    - name: Checkout
      uses: actions/checkout@v4



    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: back/package-lock.json



    - name: Install dependencies
      run: npm ci



    - name: Lint
      run: npm run lint



    - name: Tests
      run: npm test



    - name: Build
      run: npm run build